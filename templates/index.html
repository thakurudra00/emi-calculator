<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMI Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-4xl">
    <h1 class="text-3xl font-bold mb-6 text-center">EMI Calculator</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

      <!-- Inputs -->
      <div>
        <!-- Loan Amount -->
        <label class="block mb-1 font-semibold">Loan Amount (₹)</label>
        <input id="principalInput" type="number" class="w-full p-2 border rounded mb-2">
        <input id="principal" type="range" min="10000" max="5000000" step="10000" class="w-full mb-4">

        <!-- Interest Rate -->
        <label class="block mb-1 font-semibold">Interest Rate (% p.a)</label>
        <input id="rateInput" type="number" step="0.1" class="w-full p-2 border rounded mb-2">
        <input id="rate" type="range" min="1" max="20" step="0.1" class="w-full mb-4">

        <!-- Tenure -->
        <label class="block mb-1 font-semibold">Loan Tenure (Years)</label>
        <input id="yearsInput" type="number" class="w-full p-2 border rounded mb-2">
        <input id="years" type="range" min="1" max="30" step="1" class="w-full mb-4">
      </div>

      <!-- Results -->
      <div class="bg-gray-50 p-6 rounded-xl shadow-inner">
        <h2 class="text-xl font-semibold mb-4">Results</h2>

        <p class="mb-2">Monthly EMI:</p>
        <p id="emi" class="text-2xl font-bold text-green-600 mb-4">₹ 0</p>

        <p class="mb-2">Total Interest:</p>
        <p id="interest" class="text-lg font-semibold mb-4">₹ 0</p>

        <p class="mb-2">Total Payment:</p>
        <p id="total" class="text-lg font-semibold">₹ 0</p>
      </div>

    </div>
  </div>

<script>
// Sync slider ↔ input
function sync(input, slider) {
  input.addEventListener('input', () => {
    slider.value = input.value;
    calculateEMI();
  });

  slider.addEventListener('input', () => {
    input.value = slider.value;
    calculateEMI();
  });
}

const pInput = document.getElementById('principalInput');
const pSlider = document.getElementById('principal');

const rInput = document.getElementById('rateInput');
const rSlider = document.getElementById('rate');

const yInput = document.getElementById('yearsInput');
const ySlider = document.getElementById('years');

// Default values
pInput.value = pSlider.value = 1000000;
rInput.value = rSlider.value = 6.5;
yInput.value = ySlider.value = 5;

sync(pInput, pSlider);
sync(rInput, rSlider);
sync(yInput, ySlider);

// Live calculation via Flask
async function calculateEMI() {
  let p = pInput.value;
  let r = rInput.value;
  let y = yInput.value;

  if (!p || !r || !y) return;

  try {
    let response = await fetch('http://127.0.0.1:5000/calculate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ principal: p, rate: r, years: y })
    });

    let data = await response.json();

    document.getElementById('emi').innerText = "₹ " + data.emi.toLocaleString();
    document.getElementById('interest').innerText = "₹ " + data.interest.toLocaleString();
    document.getElementById('total').innerText = "₹ " + data.total.toLocaleString();
  } catch (e) {
    console.log("Backend not running");
  }
}

// Initial calculation
calculateEMI();
</script>

</body>
</html>
